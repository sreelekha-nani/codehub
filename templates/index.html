{% extends "base.html" %}

{% block content %}

        <p class="lead text-secondary mb-5 fs-4">The ultimate platform for coding competitions and skill building. Are you ready to solve the challenge?</p>
        
        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
