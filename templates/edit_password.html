{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0 rounded-4">
            <div class="card-header bg-white py-3 border-0 text-center">
                <h4 class="mb-0 fw-bold text-primary"><i class="bi bi-shield-lock me-2"></i>Change Password for {{ user.username }}</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">New Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Minimum 8 characters" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Confirm New Password</label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Re-type password" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary py-2 fw-bold">Update and Secure</button>
                        <a href="{{ url_for('admin_panel') }}" class="btn btn-light text-muted">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
