{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold text-primary">Student Login</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold text-secondary small text-uppercase">Username</label>
                        <input type="text" name="username" class="form-control form-control-lg bg-light border-0" id="username" placeholder="Enter username" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold text-secondary small text-uppercase">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg bg-light border-0" id="password" placeholder="Enter password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Login</button>
                    </div>
                </form>
                <div class="mt-4 text-center">
                    <p class="text-muted small mb-0">Admin? Log in with your admin credentials here.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
